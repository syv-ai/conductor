name: Publish

# Triggered on tag push (e.g. ``git tag v0.1.0 && git push --tags``).
# Builds all three packages (``syv-conductor``, ``syv-conductor-nodes``,
# ``syv-conductor-providers``) and uploads them to PyPI.
#
# Auth: ``PYPI_API_TOKEN`` repo secret. Use a project-scoped token from
# https://pypi.org/manage/account/token/ — limit it to the three packages
# rather than account-wide. Trusted Publishing (OIDC) is the long-term
# upgrade once all three projects exist on PyPI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - conductor
          - conductor-nodes
          - conductor-providers
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Hatchling reads LICENSE from the project root (the dir holding
      # pyproject.toml). Stage the repo-level LICENSE into each package
      # so every wheel ships its own copy.
      - name: Stage LICENSE
        run: cp LICENSE packages/${{ matrix.package }}/LICENSE

      - name: Build wheels + sdist
        working-directory: packages/${{ matrix.package }}
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: packages/${{ matrix.package }}/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-merged
          pattern: dist-*
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-merged/
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Skip already-uploaded versions instead of failing the run —
          # makes re-running a tag idempotent.
          skip-existing: true
