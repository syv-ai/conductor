name: Publish

# Triggered on tag push (e.g. ``git tag v0.1.0 && git push --tags``).
# Builds all three packages (``syv-conductor``, ``syv-conductor-nodes``,
# ``syv-conductor-providers``) into a single ``dist/`` and uploads them
# to PyPI.
#
# Auth: ``PYPI_API_TOKEN`` repo secret. Use a project-scoped token from
# https://pypi.org/manage/account/token/ — limit it to the three packages
# rather than account-wide. Trusted Publishing (OIDC) is the long-term
# upgrade once all three projects exist on PyPI.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Hatchling reads LICENSE from the project root (the dir holding
      # pyproject.toml). Stage the repo-level LICENSE into each package
      # so every wheel ships its own copy.
      - name: Stage LICENSE into each package
        run: |
          for pkg in conductor conductor-nodes conductor-providers; do
            cp LICENSE "packages/$pkg/LICENSE"
          done

      # Build straight into a shared ``dist/`` so the publish step has
      # a single, predictable directory to upload.
      - name: Build wheels + sdists
        run: |
          mkdir -p dist
          for pkg in conductor conductor-nodes conductor-providers; do
            uv build "packages/$pkg" --out-dir dist
          done
          ls -la dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Idempotent on re-runs of the same tag.
          skip-existing: true
