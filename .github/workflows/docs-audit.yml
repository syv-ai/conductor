# Weekly (and manual) docs audit.
#
# Reads the last 14 days of commits, compares them against the user-facing
# docs, and opens a PR if anything is out of sync. This is the async,
# low-friction counterpart to the local `/docs-audit` slash command — use
# the slash command during active development, rely on this workflow to
# catch anything that slipped through.
#
# Setup:
#   1. Create a repository secret named ANTHROPIC_API_KEY with a key that
#      has permission to call the Claude API.
#   2. Ensure GitHub Actions has "Read and write permissions" and the
#      setting "Allow GitHub Actions to create and approve pull requests"
#      is enabled (Settings → Actions → General → Workflow permissions).
#   3. First run can be kicked off manually via the Actions tab → Docs
#      audit → Run workflow.

name: Docs audit

on:
  schedule:
    - cron: "0 9 * * MON"   # weekly Monday 09:00 UTC
  workflow_dispatch:

concurrency:
  group: docs-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js (for Claude Code CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run docs audit
        run: |
          claude \
            --print \
            --permission-mode acceptEdits \
            --allowed-tools "Read,Edit,Write,Bash,Grep,Glob" \
            "$(cat <<'PROMPT'
          Read commits from the last 14 days:

              git log --since='14 days ago' --oneline

          For each relevant commit (one that touches public API, default
          behavior, or counts already cited in docs), inspect the diff with
          `git show --stat <sha>` and `git show <sha> -- <paths>`.

          Then read and compare against these docs:
              CLAUDE.md
              README.md
              docs/llms.txt
              docs/shared-references.md
              docs/index.md

          Look for drift:
            - New public APIs (module, class, function, field) not documented.
            - New node fields / enum values / exception types missing from
              the hierarchy diagrams.
            - Changed default behavior not reflected.
            - Test counts or example counts that are out of date — run
              `uv run pytest tests/ --collect-only -q 2>&1 | tail -1` for
              the authoritative number, `ls examples/*.ipynb | wc -l` for
              the notebook count. Use these actual values, not estimates.
            - Feature Map entries that should exist but don't.

          Apply edits directly to those doc files. Keep changes minimal:
          describe what exists now; don't editorialize or add marketing
          prose. Prefer tightening existing wording over new sections.

          Constraints:
            - Only edit CLAUDE.md, README.md, docs/llms.txt,
              docs/shared-references.md, docs/index.md. No code, tests,
              examples, or demo.
            - Do not run `git commit` or `git push`; the workflow handles
              that outside this turn.
            - If a commit message describes something not present in the
              code, trust the code and skip that commit. Note it in the
              final summary.
            - If a change would touch the behavioral contract in a design
              doc (docs/shared-references.md), only update descriptive
              wording — do not add or remove design decisions. Flag any
              such change at the end instead.
            - If nothing is out of sync, say so explicitly and exit
              without edits.

          Print a short summary at the end of your turn listing which docs
          were edited and why.
          PROMPT
          )"

      - name: Open PR if docs changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/docs-audit
          delete-branch: true
          title: "chore: automated docs audit"
          commit-message: |
            chore: automated docs audit

            Proposed by the weekly docs-audit workflow. Review carefully —
            Claude made these edits based on the last 14 days of commits.
            Close without merging if the changes don't reflect the actual
            state of the code.
          body: |
            ## Automated docs audit

            Generated by `.github/workflows/docs-audit.yml`.

            This PR proposes doc edits based on the last 14 days of
            commits. Claude compared recent changes against the
            user-facing docs and suggested the edits below.

            **Before merging:**
            - Read each change and confirm it describes actual behavior,
              not wishful thinking.
            - If something feels off, close this PR — it can always be
              rerun manually from the Actions tab.
            - If the audit flagged a discrepancy it couldn't resolve, it
              will be in the workflow run log.
          labels: |
            docs
            automated
