[project]
name = "conductor-providers"
version = "0.1.0"
description = "Framework adapters for conductor. Ships a React (ReactFlow) provider with graph_to_react / react_to_graph / palette_from_registry; sibling subpackages can add Vue, Svelte, etc."
requires-python = ">=3.12"
authors = [{ name = "Syvai", email = "billy@syv.ai" }]
license = { text = "Proprietary" }
classifiers = [
    "Private :: Do Not Upload",
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = ["conductor"]

[project.optional-dependencies]
# `conductor_providers.fastapi` — HTTP transport adapter. Optional because
# frontend-only consumers (e.g. conductor_providers.react) don't need fastapi.
fastapi = ["fastapi>=0.100", "pydantic>=2.0"]

[project.urls]
Repository = "https://github.com/syvai/conductor"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/conductor_providers"]
