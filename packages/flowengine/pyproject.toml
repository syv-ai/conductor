[project]
name = "flowengine"
version = "0.1.0"
description = "Core flow execution engine — registry, compiler, executor"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flowengine"]
