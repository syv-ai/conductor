[project]
name = "conductor-nodes"
version = "0.1.0"
description = "Reusable node library for the conductor DAG engine — text, math, logic, JSON, regex, and loop markers"
requires-python = ">=3.12"
dependencies = ["conductor", "pydantic>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/conductor_nodes"]
